name: python-graphblas-docs
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.13
  - pip
  # python-graphblas dependencies
  - donfig
  - numba
  - python-suitesparse-graphblas>=7.4.0.0
  - pyyaml
  # extra dependencies
  - matplotlib
  - networkx
  - pandas
  - scipy>=1.7.0
  # docs dependencies
  - nbsphinx
  - numpydoc
  - pydata-sphinx-theme>=0.15
  - sphinx>=7
  - sphinx-design
